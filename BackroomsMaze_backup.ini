; Backrooms Maze Screensaver settings
; Paths can be absolute, or relative to this SCR folder/current project folder.

[Renderer]
AllowWarpFallback=0

[Maze]
Width=25
Height=25
RoomCount=3
RoomMinRadius=1.5
RoomMaxRadius=3
RoomCountRange=1
RoomMinRadiusRange=1
RoomMaxRadiusRange=1
RandomSeed=0

MapOverlay=1

TileWidthMeters=1.6
TileLengthMeters=1.6
WallHeightMeters=2.6

[Randomization]
; 0 keeps configured values fixed. 1 enables bounded per-run jitter.
; Camera AI, Flashlight Motion, and non-blood/flesh Atmosphere values use +/-15%.
; Maze room +/- fields are explicit integer ranges, also scaled by this value.
RunVariation=0.1

[Textures]
